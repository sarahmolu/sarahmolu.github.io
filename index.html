<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sarah Molu | Examples of Work</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            max-width: 1400px;
            margin: 60px auto;
            padding: 0 20px;
            background: white;
            color: #111;
            text-align: center;
        }

        h1 {
            font-size: 2rem;
            font-weight: 400;
            letter-spacing: -0.03em;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 0.95rem;
            font-weight: 300;
            color: #666;
            margin-bottom: 60px;
        }

        img {
            height: auto;
            display: block;
            margin: 70px auto;
        }

        .favorite-section {
            margin-top: 120px;
            margin-bottom: 80px;
        }

        h2 {
            font-size: 1rem;
            font-weight: 400;
            letter-spacing: 0.02em;
            margin-bottom: 12px;
        }

        .favorite-caption {
            font-size: 1.15rem;
            font-weight: 300;
            color: #666;
            margin-bottom: 30px;
        }

        @media (max-width: 768px) {
            img {
                max-width: 95% !important;
            }
        }
    </style>
</head>

<body>

    <h1>Sarah Molu</h1>

    <p class="subtitle">Examples of Work</p>

    <img src="art1.jpg" style="max-width:70%;">

    <img src="art2.jpg" style="max-width:45%;">

    <img src="art3.jpg" style="max-width:48%;">

    <img src="art4.jpg" style="max-width:68%;">

    <img src="art5.jpg" style="max-width:70%;">

    <img src="art6.jpg" style="max-width:48%;">

    <div class="favorite-section">

        <h2>Favorite Piece</h2>

        <p class="favorite-caption">
            Created over the course of two years and gifted to my grandfather
        </p>

        <img src="grandpa.jpg" style="max-width:55%;">

    </div>

</body>
</html>
